[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

# Specific API redirects MUST come before the catch-all /*
[[redirects]]
  from = "/api/webhooks/polar"
  to = "/.netlify/functions/polar-webhook"
  status = 200

# Catch-all for React Router
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
