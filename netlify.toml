[build]
  command = "npm run build"
  publish = "dist"

# This handles the React Router redirects
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# This points the webhook URL to the Netlify Function
[[redirects]]
  from = "/api/webhooks/polar"
  to = "/.netlify/functions/polar-webhook"
  status = 200
