<!doctype html>
<html>
  <body style="margin:0;padding:0;background:#f5f1e8;font-family:Arial,Helvetica,sans-serif;color:#111111;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#f5f1e8;padding:32px 16px;">
      <tr>
        <td align="center">
          <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:640px;background:#ffffff;border:4px solid #111111;box-shadow:8px 8px 0 #111111;">
            <tr>
              <td style="padding:32px 32px 16px 32px;background:#ff6b6b;border-bottom:4px solid #111111;">
                <div style="font-size:12px;font-weight:900;letter-spacing:2px;text-transform:uppercase;">unrot</div>
                <h1 style="margin:12px 0 0 0;font-size:38px;line-height:0.95;text-transform:uppercase;font-weight:900;">Reset your password</h1>
              </td>
            </tr>
            <tr>
              <td style="padding:32px;">
                <p style="margin:0 0 16px 0;font-size:16px;line-height:1.6;font-weight:700;">We received a request to reset your password.</p>
                <p style="margin:0 0 16px 0;font-size:16px;line-height:1.6;font-weight:700;">Use the button below to choose a new password:</p>
                <p style="margin:24px 0 32px 0;">
                  <a href="{{ .ConfirmationURL }}" style="display:inline-block;background:#111111;color:#ffffff;text-decoration:none;font-weight:900;text-transform:uppercase;letter-spacing:1.5px;padding:14px 22px;border:3px solid #111111;">Reset password</a>
                </p>
                <p style="margin:0;font-size:12px;line-height:1.6;color:#555555;">If the button does not work, copy and paste this URL into your browser: <br><span style="word-break:break-all;">{{ .ConfirmationURL }}</span></p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
