<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" width="1080" height="1920">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFF9F0"/>
      <stop offset="100%" stop-color="#FFF1D8"/>
    </linearGradient>
    <filter id="shadow2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="14" dy="14" stdDeviation="0" flood-color="#1A1A1A" flood-opacity="1"/>
    </filter>
  </defs>

  <rect width="1080" height="1920" fill="url(#bg2)"/>
  <rect x="42" y="42" width="996" height="1836" fill="#FFF9F0" stroke="#1A1A1A" stroke-width="8" filter="url(#shadow2)"/>

  <text x="80" y="280" font-family="Space Grotesk, Arial, sans-serif" font-size="100" font-weight="800" fill="#1A1A1A" letter-spacing="2">DOOMSCROLL</text>
  <text x="80" y="390" font-family="Space Grotesk, Arial, sans-serif" font-size="100" font-weight="800" fill="#1A1A1A" letter-spacing="2">DETOX</text>
  <rect x="80" y="424" width="360" height="18" fill="#FF4D00"/>

  <text x="80" y="560" font-family="Outfit, Arial, sans-serif" font-size="44" font-weight="700" fill="#1A1A1A">1 minute. 1 rabbit hole.</text>
  <text x="80" y="620" font-family="Outfit, Arial, sans-serif" font-size="30" font-weight="600" fill="#1A1A1A">Turn attention into a habit, not a habit into attention loss.</text>

  <g transform="translate(80 770)">
    <rect x="0" y="0" width="920" height="420" fill="#FFD600" stroke="#1A1A1A" stroke-width="8"/>
    <rect x="32" y="32" width="856" height="356" fill="#FFF9F0" stroke="#1A1A1A" stroke-width="6"/>

    <text x="64" y="120" font-family="Space Grotesk, Arial, sans-serif" font-size="66" font-weight="800" fill="#1A1A1A">POST IDEA</text>
    <text x="64" y="190" font-family="JetBrains Mono, monospace" font-size="28" font-weight="700" fill="#1A1A1A">• i opened with black holes</text>
    <text x="64" y="240" font-family="JetBrains Mono, monospace" font-size="28" font-weight="700" fill="#1A1A1A">• ended on consciousness</text>
    <text x="64" y="290" font-family="JetBrains Mono, monospace" font-size="28" font-weight="700" fill="#1A1A1A">• and actually felt smarter after</text>
    <text x="64" y="340" font-family="JetBrains Mono, monospace" font-size="28" font-weight="700" fill="#1A1A1A">• that is the unrot effect</text>
  </g>

  <g transform="translate(80 1320)">
    <rect x="0" y="0" width="920" height="390" fill="#1A1A1A" stroke="#1A1A1A" stroke-width="8"/>
    <text x="460" y="120" text-anchor="middle" font-family="Space Grotesk, Arial, sans-serif" font-size="74" font-weight="800" fill="#FFD600" letter-spacing="4">UNROT YOUR BRAIN.</text>
    <text x="460" y="190" text-anchor="middle" font-family="Outfit, Arial, sans-serif" font-size="34" font-weight="600" fill="#FFF9F0">save this if you want less scroll and more signal</text>
    <rect x="220" y="238" width="480" height="74" fill="#FF4D00" stroke="#FFF9F0" stroke-width="6"/>
    <text x="460" y="286" text-anchor="middle" font-family="Space Grotesk, Arial, sans-serif" font-size="28" font-weight="800" fill="#FFF9F0" letter-spacing="4">START A SESSION</text>
  </g>
</svg>
